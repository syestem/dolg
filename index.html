<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Трекер долгов</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      const useClassicFallback = location.protocol === "file:" || new URLSearchParams(location.search).has("classic");
      const script = document.createElement("script");
      script.src = useClassicFallback ? "./js/file-app.js" : "./js/main.js";
      if (!useClassicFallback) {
        script.type = "module";
      }
      document.body.append(script);
    </script>
  </body>
</html>
